<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>代码片段管理器 - Code Snippet Vault</title>
    <!-- 第三方库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-dark: #0d1117;
            --bg-card: #161b22;
            --border-color: #30363d;
            --text-primary: #ffffff;
            --text-secondary: #e0e6ed;
            --accent-blue: #58a6ff;
            --accent-green: #3fb950;
            --accent-red: #f85149;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
        }

        /* 侧边栏 */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100vh;
            background-color: var(--bg-card);
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
            z-index: 100;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-header h3 {
            font-size: 1.25rem;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-header h3 i {
            color: var(--accent-blue);
        }

        .nav-menu {
            padding: 16px 0;
        }

        .nav-item {
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            border-left: 2px solid transparent;
        }

        .nav-item:hover, .nav-item.active {
            background-color: rgba(88, 166, 255, 0.1);
            color: var(--text-primary);
            border-left-color: var(--accent-blue);
        }

        .nav-item i {
            width: 20px;
        }

        /* 主内容区 */
        .main-content {
            margin-left: 280px;
            padding: 20px 30px;
        }

        /* 卡片样式 */
        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        .card-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-primary);
        }

        .card-body {
            padding: 20px;
            color: var(--text-primary);
        }

        .card-title, .card-text, h2, h3, h4, h5, h6 {
            color: var(--text-primary);
        }

        /* 代码块样式 */
        .code-block {
            position: relative;
            background-color: #0a0c10;
            border-radius: 8px;
            overflow: hidden;
        }

        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 16px;
            background-color: #1e242c;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.85rem;
        }

        .code-header .language {
            color: var(--text-secondary);
        }

        .copy-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background-color: rgba(255,255,255,0.1);
            color: var(--accent-green);
        }

        .copy-btn.copied {
            color: var(--accent-green);
        }

        pre {
            margin: 0;
            padding: 16px;
            overflow-x: auto;
        }

        code {
            font-family: 'SF Mono', 'JetBrains Mono', monospace;
            font-size: 0.85rem;
        }

        /* 标签样式 */
        .tag {
            display: inline-block;
            padding: 2px 8px;
            background-color: rgba(88, 166, 255, 0.15);
            color: var(--accent-blue);
            border-radius: 20px;
            font-size: 0.75rem;
            margin-right: 6px;
            margin-bottom: 6px;
        }

        .category-badge {
            display: inline-block;
            padding: 2px 10px;
            background-color: rgba(63, 185, 80, 0.15);
            color: var(--accent-green);
            border-radius: 20px;
            font-size: 0.7rem;
        }

        /* 表单样式 */
        .form-control, .form-select {
            background-color: #0a0c10;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        .form-control:focus, .form-select:focus {
            background-color: #0a0c10;
            border-color: var(--accent-blue);
            color: var(--text-primary);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.2);
        }

        label {
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text-secondary);
        }

        .match-source {
            font-size: 0.75rem;
            opacity: 0.7;
        }

        /* 搜索高亮 */
        .search-highlight {
            font-weight: 700;
            color: #ffd700;
            background: none;
        }

        /* 模态框 */
        .modal-content {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
        }

        .modal-header, .modal-footer {
            border-color: var(--border-color);
        }

        .btn-close {
            filter: invert(1);
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        /* 片段列表项 */
        .snippet-item {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: background 0.2s;
        }

        .snippet-item:hover {
            background-color: rgba(88, 166, 255, 0.05);
        }

        .snippet-title {
            font-weight: 600;
            margin-bottom: 6px;
        }

        .snippet-meta {
            font-size: 0.75rem;
            color: var(--text-secondary);
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        /* 加载动画 */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0;
            }
            .menu-toggle {
                display: block;
                position: fixed;
                top: 15px;
                left: 15px;
                z-index: 101;
                background: var(--accent-blue);
                border: none;
                color: white;
                padding: 8px 12px;
                border-radius: 6px;
            }
        }

        @media (min-width: 769px) {
            .menu-toggle {
                display: none;
            }
        }

        /* 推荐卡片特殊样式 */
        .recommend-card {
            border-left: 3px solid var(--accent-blue);
        }

        .usage-count {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>

<button class="menu-toggle" id="menuToggle">
    <i class="fas fa-bars"></i>
</button>

<!-- 侧边栏 -->
<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <h3>
            <i class="fas fa-code"></i>
            Code Vault
        </h3>
        <small class="text-secondary">代码片段管理器</small>
    </div>

    <div class="nav-menu">
        <div class="nav-item active" data-view="dashboard">
            <i class="fas fa-tachometer-alt"></i>
            <span>仪表盘</span>
        </div>
        <div class="nav-item" data-view="snippets">
            <i class="fas fa-database"></i>
            <span>我的片段</span>
        </div>
        <div class="nav-item" data-view="search">
            <i class="fas fa-search"></i>
            <span>搜索</span>
        </div>
        <div class="nav-item" data-view="categories">
            <i class="fas fa-folder"></i>
            <span>分类管理</span>
        </div>
        <div class="nav-item" data-view="tags">
            <i class="fas fa-tags"></i>
            <span>标签管理</span>
        </div>
        <div class="nav-item" data-view="recommend">
            <i class="fas fa-star"></i>
            <span>智能推荐</span>
        </div>
        <div class="nav-item" data-view="import">
            <i class="fas fa-file-import"></i>
            <span>导入/导出</span>
        </div>
    </div>

    <div class="mt-auto p-3 border-top" style="border-color: var(--border-color); margin-top: auto;">
        <button class="btn btn-primary w-100" data-bs-toggle="modal" data-bs-target="#addSnippetModal">
            <i class="fas fa-plus"></i> 添加代码片段
        </button>
    </div>
</div>

<!-- 主内容区 -->
<div class="main-content" id="mainContent">
    <!-- 动态内容将渲染在这里 -->
    <div class="loading" id="loadingIndicator">
        <i class="fas fa-spinner fa-spin"></i> 加载中...
    </div>
</div>

<!-- 添加片段模态框 -->
<div class="modal fade" id="addSnippetModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fas fa-plus-circle"></i> 添加代码片段</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="addSnippetForm">
                    <div class="mb-3">
                        <label>标题 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="title" required>
                    </div>
                    <div class="mb-3">
                        <label>代码 <span class="text-danger">*</span></label>
                        <textarea class="form-control" name="code" rows="10" required style="font-family: monospace;"></textarea>
                    </div>
                    <div class="mb-3">
                        <label>语言</label>
                        <select class="form-select" name="language">
                            <option value="python">Python</option>
                            <option value="javascript">JavaScript</option>
                            <option value="java">Java</option>
                            <option value="html">HTML</option>
                            <option value="css">CSS</option>
                            <option value="sql">SQL</option>
                            <option value="go">Go</option>
                            <option value="rust">Rust</option>
                            <option value="cpp">C++</option>
                            <option value="json">JSON</option>
                            <option value="yaml">YAML</option>
                            <option value="text">Text</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label>标签 (用逗号分隔)</label>
                        <input type="text" class="form-control" name="tags" placeholder="例如: 算法, 排序, python">
                    </div>
                    <div class="mb-3">
                        <label>分类</label>
                        <select class="form-select" name="category" id="categorySelect">
                            <option value="默认">默认</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" id="submitAddSnippet">添加</button>
            </div>
        </div>
    </div>
</div>

<!-- 编辑片段模态框 -->
<div class="modal fade" id="editSnippetModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fas fa-edit"></i> 编辑片段</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="editSnippetForm">
                    <input type="hidden" name="id">
                    <div class="mb-3">
                        <label>标题</label>
                        <input type="text" class="form-control" name="title" required>
                    </div>
                    <div class="mb-3">
                        <label>代码</label>
                        <textarea class="form-control" name="code" rows="10" required style="font-family: monospace;"></textarea>
                    </div>
                    <div class="mb-3">
                        <label>语言</label>
                        <select class="form-select" name="language">
                            <option value="python">Python</option>
                            <option value="javascript">JavaScript</option>
                            <option value="java">Java</option>
                            <option value="html">HTML</option>
                            <option value="css">CSS</option>
                            <option value="sql">SQL</option>
                            <option value="go">Go</option>
                            <option value="rust">Rust</option>
                            <option value="cpp">C++</option>
                            <option value="json">JSON</option>
                            <option value="yaml">YAML</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label>标签</label>
                        <input type="text" class="form-control" name="tags" placeholder="用逗号分隔">
                    </div>
                    <div class="mb-3">
                        <label>分类</label>
                        <select class="form-select" name="category" id="editCategorySelect"></select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-danger" id="deleteSnippetBtn">删除</button>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" id="submitEditSnippet">保存</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // API 基础路径
    const API_BASE = '/api';

    // 全局状态
    let currentView = 'dashboard';
    let tagFilterKeyword = '';
    const requestCache = {};
    let currentSnippetId = null;

    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
        loadCategories();
        loadDashboard();
        bindEvents();
    });

    function bindEvents() {
        // 导航点击
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', (e) => {
                const view = item.dataset.view;
                if (view) {
                    switchView(view);
                }
            });
        });

        // 菜单切换
        document.getElementById('menuToggle')?.addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('open');
        });

        // 添加片段提交
        document.getElementById('submitAddSnippet')?.addEventListener('click', addSnippet);

        // 编辑片段提交
        document.getElementById('submitEditSnippet')?.addEventListener('click', updateSnippet);
        document.getElementById('deleteSnippetBtn')?.addEventListener('click', deleteSnippet);
    }

    async function apiCall(endpoint, method = 'GET', data = null, opts = {}) {
        // GET 请求缓存：同一端点 200ms 内只请求一次
        if (method === 'GET' && !opts.noCache) {
            const now = Date.now();
            const cached = requestCache[endpoint];
            if (cached && now - cached.time < 200) {
                return cached.data;
            }
            requestCache[endpoint] = { time: now, data: null };  // 占位，防并发
        }
        const options = {
            method,
            headers: {
                'Content-Type': 'application/json'
            }
        };
        if (data) {
            options.body = JSON.stringify(data);
        }

        try {
            const response = await fetch(`${API_BASE}${endpoint}`, options);
            const result = await response.json();
            if (!result.success) {
                throw new Error(result.error || '请求失败');
            }
            // 缓存成功返回的数据
            if (method === 'GET' && !opts.noCache && requestCache[endpoint]) {
                requestCache[endpoint].data = result.data;
            }
            return result.data;
        } catch (error) {
            console.error('API Error:', error);
            showToast(error.message, 'error');
            throw error;
        }
    }

    function showToast(message, type = 'info') {
        // 简单的toast实现
        const toast = document.createElement('div');
        toast.className = `alert alert-${type === 'error' ? 'danger' : 'success'} position-fixed bottom-0 end-0 m-3`;
        toast.style.zIndex = '9999';
        toast.innerHTML = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    async function loadCategories() {
        try {
            const categories = await apiCall('/categories');
            const select = document.getElementById('categorySelect');
            const editSelect = document.getElementById('editCategorySelect');
            if (select) {
                select.innerHTML = categories.map(c => `<option value="${c.name}">${c.name} (${c.snippet_count})</option>`).join('');
            }
            if (editSelect) {
                editSelect.innerHTML = categories.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
            }
        } catch (e) {}
    }

    async function loadDashboard() {
        showLoading(true);
        try {
            const stats = await apiCall('/statistics');
            const recentSnippets = await apiCall('/snippets?limit=10');
            const recommended = await apiCall('/recommend?limit=5');

            const html = `
                <div class="container-fluid">
                    <h2 class="mb-4"><i class="fas fa-tachometer-alt"></i> 仪表盘</h2>

                    <!-- 统计卡片 -->
                    <div class="row mb-4">
                        <div class="col-md-3 mb-3">
                            <div class="card">
                                <div class="card-body">
                                    <h5 class="text-secondary">总片段数</h5>
                                    <h2 class="mb-0">${stats.total_snippets}</h2>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3 mb-3">
                            <div class="card">
                                <div class="card-body">
                                    <h5 class="text-secondary">分类数</h5>
                                    <h2 class="mb-0">${stats.total_categories}</h2>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3 mb-3">
                            <div class="card">
                                <div class="card-body">
                                    <h5 class="text-secondary">标签数</h5>
                                    <h2 class="mb-0">${stats.total_tags}</h2>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3 mb-3">
                            <div class="card">
                                <div class="card-body">
                                    <h5 class="text-secondary">最常用语言</h5>
                                    <h2 class="mb-0">${stats.most_used_language}</h2>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 最热门片段 -->
                    ${stats.most_popular_snippets && stats.most_popular_snippets.length ? `
                    <div class="card mb-4">
                        <div class="card-header">
                            <i class="fas fa-fire"></i> 热门片段 TOP5
                        </div>
                        <div class="card-body p-0">
                            ${stats.most_popular_snippets.map((s, i) => `
                            <div class="snippet-item" data-id="${s.id}" style="cursor:pointer">
                                <div class="snippet-title">
                                    <span class="badge me-2 ${i === 0 ? 'bg-warning text-dark' : 'bg-secondary'}">#${i + 1}</span>
                                    ${escapeHtml(s.title)}
                                </div>
                                <div class="snippet-meta">
                                    <span><i class="fas fa-chart-line"></i> 使用 ${s.usage_count} 次</span>
                                </div>
                            </div>
                            `).join('')}
                        </div>
                    </div>
                    ` : ''}

                    <!-- 最近片段 -->
                    <div class="card mb-4">
                        <div class="card-header">
                            <i class="fas fa-clock"></i> 最近添加
                        </div>
                        <div class="card-body p-0">
                            ${renderSnippetList(recentSnippets)}
                        </div>
                    </div>

                    <!-- 智能推荐 -->
                    <div class="card">
                        <div class="card-header">
                            <i class="fas fa-star text-warning"></i> 为你推荐
                        </div>
                        <div class="card-body p-0">
                            ${renderSnippetList(recommended, true)}
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('mainContent').innerHTML = html;
            attachSnippetClickEvents();
        } catch (e) {
            document.getElementById('mainContent').innerHTML = '<div class="alert alert-danger">加载失败</div>';
        }
        showLoading(false);
    }

    async function loadSnippets() {
        showLoading(true);
        try {
            const snippets = await apiCall('/snippets?limit=100');
            const html = `
                <div class="container-fluid">
                    <h2 class="mb-4"><i class="fas fa-database"></i> 我的片段</h2>
                    <div class="card">
                        <div class="card-header">
                            <span>全部片段 (${snippets.length})</span>
                            <input type="text" class="form-control form-control-sm w-auto" placeholder="过滤..." id="filterInput">
                        </div>
                        <div class="card-body p-0" id="snippetsList">
                            ${renderSnippetList(snippets)}
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('mainContent').innerHTML = html;

            // 过滤功能
            document.getElementById('filterInput')?.addEventListener('input', (e) => {
                const keyword = e.target.value.toLowerCase();
                const items = document.querySelectorAll('.snippet-item');
                items.forEach(item => {
                    const title = item.querySelector('.snippet-title')?.innerText.toLowerCase();
                    if (title?.includes(keyword)) {
                        item.style.display = '';
                    } else {
                        item.style.display = 'none';
                    }
                });
            });

            attachSnippetClickEvents();
        } catch (e) {
            document.getElementById('mainContent').innerHTML = '<div class="alert alert-danger">加载失败</div>';
        }
        showLoading(false);
    }

    async function loadSearchView() {
        const html = `
            <div class="container-fluid">
                <h2 class="mb-4"><i class="fas fa-search"></i> 全文搜索</h2>
                <div class="card mb-4">
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-8">
                                <input type="text" class="form-control" id="searchKeyword" placeholder="输入关键词或正则表达式...">
                            </div>
                            <div class="col-md-3">
                                <select class="form-select" id="searchField">
                                    <option value="all">全部字段</option>
                                    <option value="title">标题</option>
                                    <option value="code">代码</option>

    function toggleCode(btn, id) {
        const block = document.getElementById(`codeBlock-${id}`);
        const isHidden = block.style.display === 'none';
        block.style.display = isHidden ? 'block' : 'none';
        btn.textContent = isHidden ? '收起代码' : '展开代码';
        if (isHidden) {
            // 渲染 highlight.js
            const codeEl = block.querySelector('code');
            if (codeEl && !codeEl.dataset.highlighted) {
                hljs.highlightElement(codeEl);
                codeEl.dataset.highlighted = '1';
            }
        }
    }

    async function copyCode(btn, id) {
        const code = document.querySelector(`#codeBlock-${id} code`).textContent;
        try {
            await navigator.clipboard.writeText(code);
            btn.innerHTML = '<i class="fas fa-check"></i> 已复制';
            setTimeout(() => { btn.innerHTML = '<i class="fas fa-copy"></i> 复制'; }, 2000);
        } catch (e) {
            // fallback
            const ta = document.createElement('textarea');
            ta.value = code;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            ta.remove();
            btn.innerHTML = '<i class="fas fa-check"></i> 已复制';
            setTimeout(() => { btn.innerHTML = '<i class="fas fa-copy"></i> 复制'; }, 2000);
        }
    }

    /** 高亮文本中的中文字符：给关键词中的每个中文字加高亮 */
    function highlightChineseChars(text, chineseChars) {
        if (!chineseChars || chineseChars.length === 0) return escapeHtml(text);
        // 用正则替换每个匹配的中文字为高亮版本
        let result = escapeHtml(text);
        // 按长度从大到小排序，避免部分重叠问题
        const sorted = [...chineseChars].sort((a, b) => b.length - a.length);
        for (const c of sorted) {
            const escaped = escapeHtml(c);
            const re = new RegExp(escaped, 'g');
            result = result.replace(re, `<mark class="search-highlight">${escaped}</mark>`);
        }
        return result;
    }

    function renderSearchResult(result, keyword) {
        const snippet = result.snippet;
        const matches = result.matches || [];
        const score = result.score || 0;
        const matchedChars = result.matched_chars || [];
        const totalChars = result.total_chars || 0;

        // 提取各字段匹配信息
        const titleMatch = matches.find(m => m.field === 'title');
        const tagMatch = matches.find(m => m.field === 'tags');
        const codeMatch = matches.find(m => m.field === 'code');

        // 标题高亮：标题中的所有匹配中文字加高亮
        let highlightedTitle = escapeHtml(snippet.title);
        if (titleMatch && titleMatch.matched_chars && titleMatch.matched_chars.length > 0) {
            const chars = titleMatch.matched_chars;
            for (const c of chars) {
                const escaped = escapeHtml(c);
                const re = new RegExp(escaped, 'g');
                highlightedTitle = highlightedTitle.replace(re, `<mark class="search-highlight">${escaped}</mark>`);
            }
        } else if (codeMatch) {
            // 纯代码匹配用原关键词高亮
            const pattern = new RegExp(`(${escapeRegex(keyword)})`, 'gi');
            highlightedTitle = snippet.title.replace(pattern, '<mark class="search-highlight">$1</mark>');
        }

        // 代码预览（带高亮）
        let highlightedCode = snippet.code.substring(0, 300);
        if (codeMatch) {
            const pattern = new RegExp(`(${escapeRegex(keyword)})`, 'gi');
            highlightedCode = highlightedCode.replace(pattern, '<mark class="search-highlight">$1</mark>');
        }

        // 匹配详情：显示匹配到了哪些字
        let matchDetail = '';
        if (matchedChars.length > 0) {
            const pct = totalChars > 0 ? Math.round(matchedChars.length / totalChars * 100) : 0;
            const highlightHtml = matchedChars.map(c => `<mark class="search-highlight" style="padding: 0 1px;">${escapeHtml(c)}</mark>`).join('');
            if (pct < 100) {
                matchDetail = `匹配关键词中 ${highlightHtml} (${pct}%)`;
            } else {
                matchDetail = `完整匹配 🎯`;
            }
        } else if (codeMatch) {
            matchDetail = `代码中包含「${escapeHtml(keyword)}」`;
        }

        // 标签关联提示
        let tagHint = '';
        if (tagMatch && snippet.tags && snippet.tags.length > 0) {
            const matchTags = snippet.tags
                .filter(t => tagMatch.matched_chars && tagMatch.matched_chars.some(c => t.includes(c)))
                .map(t => `「${escapeHtml(t)}」`).join('、');
            if (matchTags) {
                tagHint = `<div class="text-secondary match-source"><i class="fas fa-hashtag" style="font-size: 0.7rem;"></i> 关联标签 ${matchTags}</div>`;
            }
        }

        const showCode = !(tagMatch && !codeMatch && !titleMatch);
        const scoreDots = score >= 200 ? '●●●' : score >= 100 ? '●●○' : '●○○';

        return `
            <div class="snippet-item" data-id="${snippet.id}">
                <div class="snippet-title d-flex align-items-start gap-2">
                    <div class="flex-grow-1">
                        <div>${highlightedTitle}</div>
                        ${matchDetail ? `<div class="text-secondary match-source" style="font-size: 0.75rem; margin-top: 2px;">🔍 ${matchDetail}</div>` : ''}
                        ${tagHint}
                    </div>
                    <span class="text-secondary flex-shrink-0" style="font-size: 0.6rem; opacity: 0.5; line-height: 1.4;">${scoreDots}</span>
                </div>
                ${showCode ? `<pre class="mt-2 mb-0" style="background: #0a0c10; padding: 8px; border-radius: 4px; font-size: 0.75rem; max-height: 100px; overflow: auto;">${escapeHtml(highlightedCode)}</pre>` : ''}
                <div class="snippet-meta mt-2">
                    <span><i class="fas fa-tag"></i> ${escapeHtml(snippet.language)}</span>
                    <span><i class="fas fa-folder"></i> ${escapeHtml(snippet.category)}</span>
                    ${snippet.tags && snippet.tags.length ? `<span><i class="fas fa-hashtag"></i> ${snippet.tags.map(t => escapeHtml(t)).join(', ')}</span>` : ''}
                </div>
            </div>
        `;
    }

    function attachSnippetClickEvents() {
        document.querySelectorAll('.snippet-item').forEach(el => {
            el.addEventListener('click', (e) => {
                if (e.target.closest('.copy-btn')) return;
                const id = el.dataset.id;
                if (id) viewSnippet(id);
            });
        });
    }

    function switchView(view) {
        currentView = view;
        document.querySelectorAll('.nav-item').forEach(item => {
            item.classList.toggle('active', item.dataset.view === view);
        });

        const views = {
            dashboard: loadDashboard,
            snippets: loadSnippets,
            search: loadSearchView,
            categories: loadCategoriesView,
            tags: loadTagsView,
            recommend: loadRecommendView,
            import: loadImportView
        };

        if (views[view]) views[view]();
    }

    function showLoading(show) {
        const indicator = document.getElementById('loadingIndicator');
        if (indicator) {
            indicator.style.display = show ? 'block' : 'none';
        }
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function escapeRegex(str) {
        return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    // 全局函数供 onclick 使用
    window.deleteCategory = deleteCategory;
    window.renameCategory = renameCategory;
    window.toggleCode = toggleCode;
    window.copyCode = copyCode;
</script>
</body>
</html>
